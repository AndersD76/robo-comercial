[phases.setup]
nixPkgs = ["chromium", "chromium-driver", "xvfb-run"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/app/ms-playwright playwright install --with-deps chromium"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/ms-playwright"
PLAYWRIGHT_CHROMIUM_USE_HEADLESS_NEW = "0"

[start]
cmd = "PLAYWRIGHT_BROWSERS_PATH=/app/ms-playwright PLAYWRIGHT_CHROMIUM_USE_HEADLESS_NEW=0 gunicorn app:app --bind 0.0.0.0:$PORT"
