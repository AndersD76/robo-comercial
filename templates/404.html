<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina nao encontrada — TurboVenda</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236366f1'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='white'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#060b18;color:#f1f5f9;min-height:100vh;
         display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .code{font-size:8rem;font-weight:800;letter-spacing:-4px;
          background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;
          -webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    h1{font-size:1.4rem;font-weight:600;margin:16px 0 8px}
    p{color:#94a3b8;font-size:15px;margin-bottom:28px}
    .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .links a{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;
             text-decoration:none;transition:.2s}
    .btn-p{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
    .btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,.4)}
    .btn-g{border:1px solid rgba(255,255,255,.15);color:#fff}
    .btn-g:hover{background:rgba(255,255,255,.06)}
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Pagina nao encontrada</h1>
    <p>A pagina que voce procura nao existe ou foi movida.</p>
    <div class="links">
      <a href="/" class="btn-p">Ir para o inicio</a>
      <a href="/blog" class="btn-g">Ler o blog</a>
      <a href="/cadastro" class="btn-g">Criar conta gratis</a>
    </div>
  </div>
</body>
</html>
